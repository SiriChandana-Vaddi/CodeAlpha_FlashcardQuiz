<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard Quiz App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f7;
      --surface: #ffffff;
      --surface2: #f2f1ee;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --text: #1a1a18;
      --text-muted: #6b6b67;
      --text-hint: #a0a09b;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --danger: #e24b4a;
      --danger-bg: #fff0f0;
      --radius-md: 8px;
      --radius-lg: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
    header p  { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

    .app { width: 100%; max-width: 580px; }

    .counter {
      font-size: 13px;
      color: var(--text-hint);
      text-align: center;
      margin-bottom: 1rem;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      min-height: 210px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 2.5rem;
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-hint);
      margin-bottom: 0.75rem;
    }
    .card-question {
      font-size: 19px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text);
    }
    .divider {
      width: 36px; height: 1px;
      background: var(--border);
      margin: 1.25rem auto;
    }
    .answer-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }
    .card-answer {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    button {
      border: 0.5px solid var(--border-md);
      background: transparent;
      color: var(--text);
      border-radius: var(--radius-md);
      padding: 9px 18px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.12s, transform 0.1s;
    }
    button:hover  { background: var(--surface2); }
    button:active { transform: scale(0.97); }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }
    button.primary:hover { background: var(--accent-hover); }

    button.danger { border-color: var(--danger); color: var(--danger); }
    button.danger:hover { background: var(--danger-bg); }

    .manage { margin-top: 0.5rem; }
    .manage-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .manage-header h2 { font-size: 15px; font-weight: 500; }

    .card-list { display: flex; flex-direction: column; gap: 8px; }

    .card-item {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .card-item-text { flex: 1; min-width: 0; overflow: hidden; }
    .card-item-text strong {
      font-size: 13px; font-weight: 500;
      display: block;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-item-text span {
      font-size: 12px; color: var(--text-hint);
      display: block;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .card-actions button { padding: 5px 10px; font-size: 12px; }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-hint);
      font-size: 15px;
    }
    .empty .icon { font-size: 36px; display: block; margin-bottom: 10px; }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.32);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 1rem;
    }
    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      width: 100%; max-width: 380px;
      border: 0.5px solid var(--border);
    }
    .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; }

    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
    .field label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
    .field input,
    .field textarea {
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 9px 11px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus,
    .field textarea:focus { border-color: var(--accent); }
    .field textarea { min-height: 80px; }

    .modal-btns {
      display: flex; gap: 8px;
      justify-content: flex-end;
      margin-top: 1.25rem;
    }

    @media (max-width: 480px) {
      .card { padding: 1.5rem 1.25rem; min-height: 180px; }
      .card-question { font-size: 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>&#x1F4DA; Flashcard Quiz</h1>
  <p>Study smarter — one card at a time</p>
</header>

<div class="app" id="app"></div>

<script>
  /* ── STATE ── */
  let cards = [
    { id: 1, q: "What is the powerhouse of the cell?",     a: "The mitochondria — it produces ATP through cellular respiration." },
    { id: 2, q: "What is Newton's Second Law of Motion?",  a: "Force equals mass times acceleration (F = ma)." },
    { id: 3, q: "What year did World War II end?",         a: "1945 — Germany surrendered in May, Japan in September." },
    { id: 4, q: "What is the capital of France?",         a: "Paris." },
  ];

  let current  = 0;
  let revealed = false;
  let modal    = null;
  let editQ    = '';
  let editA    = '';
  let nextId   = 10;

  /* ── HELPER ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  /* ── RENDER ── */
  function render() {
    const root = document.getElementById('app');
    const card = cards[current];
    let h = '';

    if (cards.length === 0) {
      h += `<div class="empty">
              <span class="icon">&#x1F4DA;</span>
              No flashcards yet — add one below!
            </div>`;
    } else {
      h += `<div class="counter">Card ${current + 1} of ${cards.length}</div>`;
      h += `<div class="card">
              <div class="card-label">Question</div>
              <div class="card-question">${esc(card.q)}</div>`;
      if (revealed) {
        h += `<div class="divider"></div>
              <div class="answer-label">Answer</div>
              <div class="card-answer">${esc(card.a)}</div>`;
      }
      h += `</div>`;

      h += `<div class="btn-row">
              <button onclick="go(-1)">&#8592; Previous</button>
              ${revealed
                ? `<button onclick="toggle()">Hide answer</button>`
                : `<button class="primary" onclick="toggle()">&#x1F441; Show answer</button>`}
              <button onclick="go(1)">Next &#8594;</button>
            </div>`;
    }

    h += `<div class="manage">
            <div class="manage-header">
              <h2>Manage cards</h2>
              <button onclick="openAdd()">&#43; Add card</button>
            </div>
            <div class="card-list">`;

    if (cards.length === 0) {
      h += `<p style="font-size:13px;color:var(--text-hint);text-align:center;padding:1rem 0">No cards yet.</p>`;
    }

    cards.forEach(c => {
      h += `<div class="card-item">
              <div class="card-item-text">
                <strong>${esc(c.q)}</strong>
                <span>${esc(c.a)}</span>
              </div>
              <div class="card-actions">
                <button onclick="openEdit(${c.id})">&#9998; Edit</button>
                <button class="danger" onclick="deleteCard(${c.id})">&#x1F5D1; Delete</button>
              </div>
            </div>`;
    });

    h += `</div></div>`;

    if (modal) {
      h += `<div class="modal-overlay" onclick="overlayClose(event)">
              <div class="modal">
                <h3>${modal.mode === 'add' ? 'Add flashcard' : 'Edit flashcard'}</h3>
                <div class="field">
                  <label for="mq">Question</label>
                  <textarea id="mq" rows="2" placeholder="Enter your question...">${esc(editQ)}</textarea>
                </div>
                <div class="field">
                  <label for="ma">Answer</label>
                  <textarea id="ma" rows="3" placeholder="Enter the answer...">${esc(editA)}</textarea>
                </div>
                <div class="modal-btns">
                  <button onclick="closeModal()">Cancel</button>
                  <button class="primary" onclick="saveCard()">
                    ${modal.mode === 'add' ? 'Add card' : 'Save changes'}
                  </button>
                </div>
              </div>
            </div>`;
    }

    root.innerHTML = h;
    if (modal) setTimeout(() => document.getElementById('mq')?.focus(), 30);
  }

  /* ── ACTIONS ── */
  function go(dir) {
    if (!cards.length) return;
    current  = (current + dir + cards.length) % cards.length;
    revealed = false;
    render();
  }

  function toggle() { revealed = !revealed; render(); }

  function openAdd() { editQ = ''; editA = ''; modal = { mode: 'add' }; render(); }

  function openEdit(id) {
    const c = cards.find(x => x.id === id);
    if (!c) return;
    editQ = c.q; editA = c.a;
    modal = { mode: 'edit', id };
    render();
  }

  function overlayClose(e) { if (e.target === e.currentTarget) closeModal(); }
  function closeModal()    { modal = null; render(); }

  function saveCard() {
    const q = (document.getElementById('mq')?.value || '').trim();
    const a = (document.getElementById('ma')?.value || '').trim();
    if (!q || !a) { alert('Please fill in both the question and the answer.'); return; }
    if (modal.mode === 'add') {
      cards.push({ id: nextId++, q, a });
      current = cards.length - 1;
    } else {
      const idx = cards.findIndex(x => x.id === modal.id);
      if (idx !== -1) cards[idx] = { ...cards[idx], q, a };
    }
    revealed = false; modal = null; render();
  }

  function deleteCard(id) {
    if (!confirm('Delete this card?')) return;
    const idx = cards.findIndex(x => x.id === id);
    if (idx === -1) return;
    cards.splice(idx, 1);
    if (current >= cards.length) current = Math.max(0, cards.length - 1);
    revealed = false; render();
  }

  /* ── KEYBOARD SHORTCUTS ── */
  document.addEventListener('keydown', e => {
    if (modal) { if (e.key === 'Escape') closeModal(); return; }
    if (e.key === 'ArrowLeft')  go(-1);
    if (e.key === 'ArrowRight') go(1);
    if (e.key === ' ') { e.preventDefault(); toggle(); }
  });

  render();
</script>
</body>
</html>
